# Contract consumer registry — who depends on which contract fields.
# contract_id must match the Bitol contract `id` in the validation report.

registry_version: "1.0"

subscriptions:
  - contract_id: week3-document-refinery-extractions
    subscriber_id: week4-cartographer
    subscriber_team: week4-lineage
    fields_consumed:
      - doc_id
      - extracted_facts
      - extracted_facts.confidence
      - source_path
      - extracted_at
    breaking_fields:
      - field: extracted_facts.confidence
        reason: >-
          Used for node ranking in the lineage graph; a scale change between 0.0–1.0
          and 0–100 inverts or corrupts ordering and downstream prioritization.
      - field: doc_id
        reason: >-
          Primary key for node identity in the lineage graph; format or uniqueness
          changes break edge resolution and deduplication.
    validation_mode: ENFORCE
    mode_upgraded_at: "2026-04-01T12:00:00Z"
    registered_at: "2026-04-01T12:00:00Z"
    contact: week4-lineage@team.local

  - contract_id: week4-brownfield-lineage-snapshot
    subscriber_id: week7-enforcer
    subscriber_team: week7-data-contracts
    fields_consumed:
      - snapshot_id
      - git_commit
      - nodes
      - edges
      - codebase_root
    breaking_fields:
      - field: edges
        reason: >-
          ValidationRunner and ViolationAttributor rely on edge referential integrity;
          shape or relationship enum changes break upstream traversal and blast radius.
      - field: nodes
        reason: >-
          Node identifiers seed BFS for attribution; missing or renamed nodes make
          producer file resolution unreliable.
    validation_mode: ENFORCE
    mode_upgraded_at: "2026-04-01T12:00:00Z"
    registered_at: "2026-04-01T12:00:00Z"
    contact: week7-enforcer@team.local

  - contract_id: week5-event-sourcing-events
    subscriber_id: week7-enforcer
    subscriber_team: week7-data-contracts
    fields_consumed:
      - event_id
      - aggregate_id
      - sequence_number
      - occurred_at
      - recorded_at
      - metadata.correlation_id
    breaking_fields:
      - field: sequence_number
        reason: >-
          Monotonic per-aggregate ordering is enforced; gaps or type changes break
          event-sourcing replay assumptions in compliance checks.
      - field: event_id
        reason: >-
          Deduplication and violation sampling use event_id; identity format changes
          orphan downstream audit trails.
    validation_mode: WARN
    mode_upgraded_at: "2026-04-01T12:00:00Z"
    registered_at: "2026-04-01T12:00:00Z"
    contact: week7-enforcer@team.local

  - contract_id: langsmith-trace-record-migrated
    subscriber_id: week7-enforcer
    subscriber_team: week7-data-contracts
    fields_consumed:
      - run_type
      - inputs
      - start_time
      - end_time
      - total_tokens
      - prompt_tokens
      - completion_tokens
    breaking_fields:
      - field: run_type
        reason: >-
          Enum-constrained run classification drives accepted_values checks; new or
          renamed run types silently skip governance buckets.
      - field: total_tokens
        reason: >-
          Token arithmetic identity (total vs prompt+completion) is validated; drift
          here indicates miscounted cost or truncated traces in AI governance reports.
    validation_mode: AUDIT
    mode_upgraded_at: "2026-03-15T10:00:00Z"
    registered_at: "2026-04-01T12:00:00Z"
    contact: week7-enforcer@team.local
