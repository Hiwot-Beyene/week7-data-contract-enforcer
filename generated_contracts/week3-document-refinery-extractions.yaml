kind: DataContract
apiVersion: v3.0.0
id: week3-document-refinery-extractions
info:
  title: Week 3 Document Refinery — Extraction Records
  version: 1.0.0
  owner: week3-team
  description: Generated from profiled JSONL via CLI; clauses map nullability, types, and confidence bounds.
servers:
  local:
    type: local
    path: outputs/week3/extractions.jsonl
    format: jsonl
    note: Uses post-migration contract-aligned JSONL under outputs/migrate/.
terms:
  usage: Internal inter-system data contract. Do not publish raw exports.
  limitations: Profiling reflects migrated snapshot only; regenerate after migrations.
schema:
  timestamp:
    type: string
    required: true
  doc_id:
    type: string
    required: true
    format: uuid
    pattern: ^[0-9a-f-]{36}$
  document_name:
    type: string
    required: true
  final_strategy:
    type: string
    required: true
    enum:
    - B
    - C
  confidence_score:
    type: number
    required: true
    minimum: 0.0
    maximum: 1.0
    description: Confidence score. Must remain 0.0–1.0 float. BREAKING if changed to 0–100.
  cost_estimate_usd:
    type: number
    required: true
  processing_time_ms:
    type: integer
    required: true
  budget_cap_usd:
    type: number
    required: true
  budget_status:
    type: string
    required: true
    enum:
    - under_cap
  notes:
    type: string
    required: false
    enum:
    - layout_vision_fallback
  prompt_tokens:
    type: number
    required: false
  completion_tokens:
    type: number
    required: false
  entities:
    type: array
    required: false
  token_count:
    type: object
    required: false
    properties:
      input:
        type: integer
        required: false
      output:
        type: integer
        required: false
