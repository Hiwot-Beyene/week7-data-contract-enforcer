kind: DataContract
apiVersion: v3.0.0
id: week3-document-refinery-extractions
info:
  title: Week 3 Document Refinery — Extraction Records (migrated)
  version: 1.0.0
  owner: week3-team
  description: One record per processed document. Inputs read from outputs/migrate/migrated_extractions.jsonl.
servers:
  local:
    type: local
    path: outputs/migrate/migrated_extractions.jsonl
    format: jsonl
    note: Uses post-migration contract-aligned JSONL under outputs/migrate/.
terms:
  usage: Internal inter-system data contract. Do not publish raw exports.
  limitations: Profiling reflects migrated snapshot only; regenerate after migrations.
schema:
  doc_id:
    type: string
    format: uuid
    pattern: ^[0-9a-f-]{36}$
    required: true
    unique: true
    description: Primary key (deterministic UUID post-migration).
  source_path:
    type: string
    required: true
    description: Source document path or filename.
  source_hash:
    type: string
    pattern: ^[a-f0-9]{64}$
    required: false
    description: SHA-256 when present; often null in legacy migrated export.
  extracted_facts:
    type: array
    description: Facts array; migrated export uses legacy summary fact with confidence.
    items:
      confidence:
        type: number
        minimum: 0.0
        maximum: 1.0
        required: true
      fact_id:
        type: string
        format: uuid
        pattern: ^[0-9a-f-]{36}$
        required: true
  entities:
    type: array
    required: false
  extraction_model:
    type: string
    required: false
    description: Model id when present.
  processing_time_ms:
    type: integer
    minimum: 1
    required: true
  token_count:
    type: object
    properties:
      input:
        type: integer
        required: false
      output:
        type: integer
        required: false
  extracted_at:
    type: string
    format: date-time
    required: true
