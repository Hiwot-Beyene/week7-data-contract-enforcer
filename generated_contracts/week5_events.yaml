kind: DataContract
apiVersion: v3.0.0
id: week5-event-sourcing-events
info:
  title: Week 5 Event Sourcing — Event Records (migrated)
  version: 1.0.0
  owner: week5-team
  description: Canonical envelope events; inputs from outputs/migrate/migrated_events.jsonl.
servers:
