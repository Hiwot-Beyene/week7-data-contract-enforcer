  aggregate_id:
    type: string
    format: uuid
    required: true
  aggregate_type:
    type: string
    required: true
  sequence_number:
    type: integer
    minimum: 1
    required: true
  payload:
    type: object
    required: true
  metadata:
    type: object
    required: true
    properties:
      causation_id:
        type: string
        required: false
      correlation_id:
        type: string
        format: uuid
        required: true
      user_id:
        type: string
        required: false
      source_service:
        type: string
        required: true
  schema_version:
    type: string
    required: true
  occurred_at:
    type: string
    format: date-time
    required: true
  recorded_at:
    type: string
    format: date-time
    required: true
