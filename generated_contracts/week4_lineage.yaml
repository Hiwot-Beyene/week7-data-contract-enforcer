kind: DataContract
apiVersion: v3.0.0
id: week4-brownfield-lineage-snapshot
info:
  title: Week 4 Brownfield Cartographer — Lineage Snapshot (migrated)
  version: 1.0.0
  owner: week4-team
  description: Single snapshot JSONL line; migrated relative pipeline node_ids.
servers:
  local:
    type: local
    path: outputs/migrate/migrated_lineage_snapshots.jsonl
    format: jsonl
    note: Uses post-migration contract-aligned JSONL under outputs/migrate/.
terms:
  usage: Internal inter-system data contract. Do not publish raw exports.
  limitations: Profiling reflects migrated snapshot only; regenerate after migrations.
schema:
  snapshot_id:
    type: string
    format: uuid
    required: true
  codebase_root:
    type: string
    required: true
  git_commit:
    type: string
    pattern: ^[a-f0-9]{40}$
    required: true
  nodes:
    type: array
    items:
      node_id:
        type: string
        required: true
      type:
        type: string
        enum:
        - FILE
        - TABLE
        - SERVICE
        - MODEL
        - PIPELINE
        - EXTERNAL
      label:
        type: string
      metadata:
        type: object
  edges:
    type: array
    items:
      source:
        type: string
        required: true
      target:
        type: string
        required: true
      relationship:
        type: string
        enum:
        - IMPORTS
        - CALLS
        - READS
        - WRITES
        - PRODUCES
        - CONSUMES
      confidence:
        type: number
        minimum: 0.0
        maximum: 1.0
  captured_at:
    type: string
    format: date-time
    required: true
profiling:
  engine: ydata-profiling
  generated_at: '2026-04-01T21:27:51Z'
  structural:
    nodes_table:
      ydata_profiling:
        status: ok
        dataset: week4_lineage_nodes
        alerts: []
        variable_count: 0
      columns:
